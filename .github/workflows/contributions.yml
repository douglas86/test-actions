name: Update Contributions
on:
  push:
    branches:
      - main
permissions:
  contents: write
  pull-requests: write
jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Update Contributions List
        run: |
          PAYLOAD='${{ github.actor }}.png'
          sed -i "\|Contributors|a $PAYLOAD" README.md
          git config --local user.email "action@github.com"
          git config --local user.name "Github Action"
          git add README.md
          git commit -m "docs: update contributors in README"
          git push origin HEAD:${{ github.ref_name }}
